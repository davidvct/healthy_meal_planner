name: Deploy to GCP

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Write backend env vars file
        shell: bash
        env:
          CLOUD_RUN_BACKEND_ENV_VARS: ${{ secrets.CLOUD_RUN_BACKEND_ENV_VARS }}
        run: |
          if [ -n "$CLOUD_RUN_BACKEND_ENV_VARS" ]; then
            printf '%s\n' "$CLOUD_RUN_BACKEND_ENV_VARS" > backend.env.yaml
          fi

      - name: Deploy backend and frontend
        shell: pwsh
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_REGION: ${{ vars.GCP_REGION }}
          BACKEND_SERVICE_NAME: ${{ vars.BACKEND_SERVICE_NAME }}
          FRONTEND_SERVICE_NAME: ${{ vars.FRONTEND_SERVICE_NAME }}
        run: |
          $params = @{
            ProjectId = $env:GCP_PROJECT_ID
            Region = $(if ($env:GCP_REGION) { $env:GCP_REGION } else { "asia-southeast1" })
            BackendServiceName = $(if ($env:BACKEND_SERVICE_NAME) { $env:BACKEND_SERVICE_NAME } else { "meal-planner-api" })
            FrontendServiceName = $(if ($env:FRONTEND_SERVICE_NAME) { $env:FRONTEND_SERVICE_NAME } else { "meal-planner-web" })
          }
          if (Test-Path backend.env.yaml) {
            $params["BackendEnvVarsFile"] = "backend.env.yaml"
          }
          ./scripts/deploy-fullstack-gcp.ps1 @params
