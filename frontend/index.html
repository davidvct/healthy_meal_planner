<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MealVitals – Smart Meal Planner</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #0B2240;
      --blue: #1560A0;
      --blue2: #1E72B8;
      --blue-l: #EBF4FF;
      --blue-xl: #F4F9FF;
      --teal: #069B8E;
      --teal2: #07B5A5;
      --teal-l: #E8F8F6;
      --teal-xl: #F2FCFA;
      --green: #18A55A;
      --green-l: #E8F8EF;
      --amber: #D97706;
      --amber-l: #FEF3C7;
      --coral: #D95F3B;
      --coral-l: #FEF0EB;
      --red: #DC2626;
      --red-l: #FEE2E2;
      --purple: #6D3FA0;
      --purple-l: #F3EEFF;
      --bg: #F7F9FC;
      --white: #fff;
      --border: #E8EDF3;
      --border2: #D4DCE8;
      --text: #0B1829;
      --text2: #4A6280;
      --text3: #8A9BB0;
      --r: 14px;
      --r-sm: 10px;
      --r-xs: 7px;
      --font: 'Plus Jakarta Sans', sans-serif;
    }
    html, body {
      height: 100%;
      background: var(--bg);
      font-family: var(--font);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }
    #root { height: 100%; display: flex; flex-direction: column; }

    /* ── Keyframes ── */
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

    /* ── Nav tiles ── */
    .nav-tile{display:flex;flex-direction:column;align-items:center;gap:3px;padding:9px 8px 8px;cursor:pointer;border-right:1px solid var(--border);position:relative;transition:background .15s;user-select:none}
    .nav-tile:last-child{border-right:none}
    .nav-tile:hover{background:var(--teal-xl)}
    .nav-tile.on{background:var(--white)}
    .nav-tile.on::after{content:'';position:absolute;bottom:0;left:15%;right:15%;height:2.5px;background:var(--teal);border-radius:2px 2px 0 0}
    .nav-tile-icon{width:22px;height:22px;display:flex;align-items:center;justify-content:center;color:var(--text3)}
    .nav-tile.on .nav-tile-icon{color:var(--teal)}
    .nav-tile-lbl{font-size:11px;font-weight:600;color:var(--text3);text-align:center;line-height:1.2}
    .nav-tile.on .nav-tile-lbl{color:#057A7A;font-weight:700}

    /* ── DayStrip ── */
    .ds-wrap{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;margin-bottom:18px;position:sticky;top:0;z-index:50;box-shadow:0 2px 8px rgba(11,34,64,.06)}
    .ds-hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:11px}
    .ds-date{font-family:var(--font);font-size:20px;font-weight:800;color:var(--text);line-height:1.2}
    .ds-sub{font-size:11px;color:var(--text3);margin-top:2px}
    .ds-nav{display:flex;align-items:center;gap:6px}
    .ds-nav-btn{width:26px;height:26px;border-radius:var(--r-xs);border:1px solid var(--border2);background:var(--white);cursor:pointer;font-size:14px;color:var(--text2);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;line-height:1;font-family:var(--font)}
    .ds-nav-btn:hover{border-color:var(--teal);color:var(--teal);background:var(--teal-xl)}
    .ds-week-pill{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:4px 14px;border-radius:var(--r-xs);border:1px solid var(--border2);background:var(--white);font-size:11px;font-weight:600;color:var(--text);white-space:nowrap;min-width:230px}
    .ds-scroll{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:7px}
    .ds-card{width:100%;border-radius:var(--r-sm);border:1.5px solid var(--border);background:var(--white);overflow:hidden;cursor:pointer;transition:border-color .15s}
    .ds-card:hover{border-color:var(--teal)}
    .ds-card.on{border-color:var(--teal);border-width:2px}
    .ds-card-hdr{padding:10px 10px 8px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
    .ds-card.on .ds-card-hdr{background:var(--navy)}
    .ds-card-day{font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.05em}
    .ds-card.on .ds-card-day{color:rgba(255,255,255,.5)}
    .ds-card-date{font-size:18px;font-weight:800;color:var(--text);line-height:1}
    .ds-card.on .ds-card-date{color:#fff}
    .ds-card-body{padding:4px 0}
    /* Meal slots */
    .ds-slot{display:flex;align-items:flex-start;gap:6px;padding:9px 10px;border-bottom:1px solid var(--border);min-height:48px}
    .ds-slot:last-child{border-bottom:none}
    .ds-slot-ic{font-size:9px;font-weight:800;width:12px;flex-shrink:0;text-transform:uppercase;color:var(--text2);margin-top:2px}
    .ds-slot-name{font-size:11px;flex:1;font-style:italic;line-height:1.35;color:var(--text3)}
    .ds-slot.ds-filled .ds-slot-ic{color:var(--teal)}
    .ds-slot.ds-filled .ds-slot-name{font-style:normal;font-weight:500;color:var(--text2)}
    /* Per-meal-type slot colour coding */
    .ds-b{border-left:3px solid #FCD34D;background:#FFFBEB}
    .ds-l{border-left:3px solid #6EE7B7;background:#F0FDF9}
    .ds-d{border-left:3px solid #93C5FD;background:#EFF6FF}
    .ds-b .ds-slot-ic{color:#92400E}
    .ds-l .ds-slot-ic{color:#065F46}
    .ds-d .ds-slot-ic{color:#1E40AF}
    .ds-b.ds-filled .ds-slot-name{color:#78350F}
    .ds-l.ds-filled .ds-slot-name{color:#064E3B}
    .ds-d.ds-filled .ds-slot-name{color:#1E3A8A}
    .ds-b.ds-filled .ds-slot-ic,.ds-l.ds-filled .ds-slot-ic,.ds-d.ds-filled .ds-slot-ic{color:var(--teal)}
    .ds-card-footer{padding:6px 9px;border-top:1px solid var(--border);font-size:10px;font-weight:600;color:var(--text2);text-align:right}
    /* Past days — grayed out */
    .ds-card.ds-past{opacity:.5;pointer-events:auto}
    .ds-card.ds-past .ds-card-hdr{background:var(--bg)}
    .ds-card.ds-past .ds-card-day,.ds-card.ds-past .ds-card-date{color:var(--text3)}
    .ds-card.ds-past.on{opacity:.7}
    .ds-card.ds-past.on .ds-card-hdr{background:#3d4f65}
    /* Locked slots */
    .ds-slot.ds-locked{opacity:.45}
    .ds-slot.ds-locked .ds-slot-ic{font-size:8px}
    /* Locked slot card in TodayScreen */
    .locked-slot{opacity:.6}
    .locked-slot .es-header{background:var(--bg)}
    /* ── Today tips ── */
    .td-tip{display:inline-flex;align-items:center;justify-content:center;width:15px;height:15px;border-radius:50%;background:var(--teal-l);border:1.5px solid var(--teal);font-size:9px;font-weight:700;color:var(--teal);cursor:default;vertical-align:middle;margin-left:3px;flex-shrink:0;position:relative;user-select:none}
    .td-tip-bubble{display:none;position:absolute;bottom:calc(100% + 5px);left:50%;transform:translateX(-50%);background:var(--white);border:1px solid var(--border2);border-radius:var(--r-sm);padding:6px 9px;font-size:10px;color:var(--text2);line-height:1.5;width:200px;white-space:normal;text-align:left;z-index:100;pointer-events:none;box-shadow:0 4px 12px rgba(11,34,64,.10)}
    .td-tip-bubble::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:5px solid transparent;border-top-color:var(--border2)}
    .td-tip:hover .td-tip-bubble{display:block}
    /* ── Section header ── */
    .today-section-hd{display:flex;align-items:baseline;gap:8px;margin-bottom:6px}
    /* ── Auto-fill action buttons ── */
    .af-action-btn{padding:7px 14px;border-radius:var(--r-sm);font-family:var(--font);font-size:12px;font-weight:700;cursor:pointer;border:none;transition:opacity .15s}
    .af-action-btn:disabled{opacity:.45;cursor:default}
    .af-btn-primary{background:var(--teal);color:#fff}.af-btn-primary:hover:not(:disabled){opacity:.88}
    .af-btn-secondary{background:var(--card);color:var(--navy);border:1px solid var(--border)}.af-btn-secondary:hover{opacity:.85}

    /* ── Today screen layout ── */
    .today-guide-banner{background:var(--blue-xl);border:1px solid rgba(21,96,160,.18);border-radius:var(--r-sm);padding:10px 13px;margin-bottom:12px;display:flex;align-items:flex-start;gap:10px;flex-shrink:0}
    .tgb-icon{width:28px;height:28px;border-radius:50%;background:var(--blue-l);border:1.5px solid rgba(21,96,160,.25);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:13px;line-height:1}
    .tgb-body{flex:1;min-width:0}
    .tgb-title{font-size:13px;font-weight:700;color:var(--blue);margin-bottom:2px}
    .tgb-sub{font-size:11px;color:var(--text2);line-height:1.5}
    .tgb-close{background:none;border:none;cursor:pointer;font-size:16px;color:var(--text3);padding:0 2px;line-height:1;flex-shrink:0;margin-top:-1px;font-family:var(--font)}
    .tgb-close:hover{color:var(--text)}
    .today-section-title{font-size:16px;font-weight:700;color:var(--text);letter-spacing:.01em;flex-shrink:0}
    .meal-progress-bar{display:flex;align-items:center;gap:8px}
    .mpb-dots{display:flex;gap:4px}
    .mpb-dot{width:8px;height:8px;border-radius:50%;background:var(--border2);transition:background .2s}
    .mpb-dot.filled{background:var(--teal)}
    .mpb-label{font-size:11px;font-weight:500;color:var(--text2)}
    .today-grid{display:grid;grid-template-columns:1fr 380px;gap:16px;align-items:start;transition:grid-template-columns .3s ease}
    .today-grid.nut-collapsed{grid-template-columns:1fr 0px}
    .meal-cards{display:flex;flex-direction:column;gap:12px}
    .nut-panel-wrap{display:flex;flex-direction:column;gap:14px;transition:opacity .25s ease,transform .25s ease}
    .nut-panel-wrap.collapsed{opacity:0;pointer-events:none;transform:translateX(12px)}
    .nut-toggle-col{display:flex;flex-direction:column;gap:14px;min-width:0;overflow:hidden}
    .nut-toggle-btn{display:flex;align-items:center;gap:5px;padding:5px 10px 5px 8px;background:var(--white);border:1px solid var(--border2);border-radius:20px;font-size:11px;font-weight:700;color:var(--text2);cursor:pointer;box-shadow:0 1px 4px rgba(11,34,64,.08);transition:all .2s;white-space:nowrap;font-family:var(--font)}
    .nut-toggle-btn:hover{border-color:var(--teal);color:var(--teal);background:var(--teal-xl)}
    .nut-toggle-btn.expanded{background:var(--navy);border-color:var(--navy);color:#fff}
    .nut-toggle-btn.expanded:hover{background:#0d2d58;border-color:#0d2d58}

    /* ── Meal card ── */
    .mc{display:block;width:100%;background:var(--white);border:1px solid var(--border);border-left:4px solid var(--border);border-radius:var(--r);overflow:hidden;cursor:pointer;transition:all .2s}
    .mc:hover{border-color:var(--teal)}.mc.exp{border-color:var(--teal)}
    .mc.mc-safe{border-left-color:var(--teal)}.mc.mc-warn{border-left-color:var(--coral)}.mc.mc-alert{border-left-color:var(--red)}
    .mc-zone-wrap{display:flex;flex-direction:column}
    .mc-zone-left{padding:12px 14px;display:flex;align-items:center;gap:10px;min-width:0}
    .mc-zone-right{padding:0 14px 12px 14px}
    .mc-compact{display:flex;align-items:center;gap:10px;padding:10px 14px}
    .mc-thumb{width:72px;height:72px;border-radius:10px;flex-shrink:0;display:flex;align-items:center;justify-content:center;overflow:hidden}
    .mc-thumb.fv-b{background:#FFFBEB;border:1.5px solid #FDE68A}
    .mc-thumb.fv-l{background:#F0FDF9;border:1.5px solid #A7F3D0}
    .mc-thumb.fv-d{background:#EFF6FF;border:1.5px solid #BFDBFE}
    .mc-icon{font-size:20px;line-height:1}
    .mc-info{flex:1;min-width:0}
    .mc-pill-c{font-size:11px;font-weight:600;color:var(--text2);display:flex;align-items:center;gap:4px;margin-bottom:1px}
    .mc-name-c{font-size:15px;font-weight:700;color:var(--text);line-height:1.2}
    .mc-kcal-badge{font-size:11px;font-weight:700;background:#E1F5EE;color:#0F6E56;padding:2px 8px;border-radius:20px;white-space:nowrap;flex-shrink:0;vertical-align:middle}
    .mc-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px}
    .mc-swap-inline{background:none;border:1px solid var(--border2);border-radius:var(--r-xs);font-size:10px;font-weight:600;color:var(--text3);cursor:pointer;font-family:var(--font);padding:3px 8px;line-height:1;white-space:nowrap;transition:all .12s;flex-shrink:0}
    .mc-swap-inline:hover{color:var(--teal);border-color:var(--teal);background:var(--teal-xl)}
    .mc-swap-inline:disabled{opacity:.5;cursor:default}
    .mc-fav-btn{background:none;border:none;cursor:pointer;font-size:14px;line-height:1;padding:2px 4px;opacity:.45;transition:opacity .15s,transform .15s,color .15s;font-family:var(--font);flex-shrink:0;position:relative;color:var(--text3)}
    .mc-fav-btn:hover{opacity:.8;color:var(--red)}.mc-fav-btn.on{opacity:1;transform:scale(1.15);color:var(--red)}
    .mc-fav-btn::after{content:attr(data-tip);position:absolute;top:calc(100% + 5px);right:0;background:var(--navy);color:#fff;font-size:10px;font-weight:600;padding:3px 8px;border-radius:5px;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .15s;z-index:300;font-family:var(--font)}
    .mc-fav-btn:hover::after{opacity:1}
    .mc-macro-pills{display:flex;gap:6px;margin-bottom:10px}
    .mc-macro-pill{flex:1;text-align:center;background:var(--bg);border-radius:8px;padding:6px 4px}
    .mc-macro-pill-v{font-size:13px;font-weight:600;color:var(--text);margin-bottom:2px}
    .mc-macro-pill-l{font-size:9px;color:var(--text2)}
    .mc-foot{display:flex;align-items:center;gap:8px}
    .mc-more{display:flex;align-items:center;justify-content:center;gap:5px;padding:6px 0;border-top:1px solid var(--border);margin-top:8px;font-size:11px;font-weight:600;color:var(--text3);cursor:pointer;letter-spacing:.02em}
    .mc-more:hover{color:var(--teal)}
    .mc-body{padding:9px 13px 11px}
    .mc-macros{display:grid;grid-template-columns:repeat(5,1fr);border:1px solid var(--border);border-radius:var(--r-sm);overflow:hidden;margin-bottom:7px}
    .mc-m{padding:6px 4px;text-align:center}.mc-m+.mc-m{border-left:1px solid var(--border)}
    .mc-ml{font-size:10px;color:var(--text2)}.mc-mv{font-size:13px;font-weight:700;color:var(--text);margin-top:1px}
    .sugg-himg.fv-b{background:linear-gradient(135deg,#FEF3C7,#FDE68A,#FCD34D)}
    .sugg-himg.fv-l{background:linear-gradient(135deg,#D1FAE5,#A7F3D0,#6EE7B7)}
    .sugg-himg.fv-d{background:linear-gradient(135deg,#DBEAFE,#BFDBFE,#93C5FD)}

    /* ── Tags ── */
    .tag{display:inline-flex;align-items:center;font-size:11px;padding:3px 9px;border-radius:20px;font-weight:600;white-space:nowrap}
    .tg-teal{background:var(--teal-l);color:#085041}.tg-amber{background:var(--coral-l);color:#8B2E10}.tg-purple{background:var(--purple-l);color:#26215C}.tg-green{background:var(--green-l);color:#27500A}.tg-red{background:var(--red-l);color:#791F1F}.tg-blue{background:var(--blue-l);color:#0C447C}.tg-muted{background:var(--bg);color:var(--text3);border:1px solid var(--border)}

    /* ── Empty slot — Option C inline suggestions ── */
    .empty-slot-c{border:1px solid var(--border);border-radius:var(--r);padding:0;background:var(--white);overflow:hidden}
    .es-header{display:flex;align-items:center;gap:8px;padding:10px 13px 8px;border-bottom:1px solid var(--border)}
    .es-lbl{font-size:12px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:6px;flex:1}
    .es-sub{font-size:11px;font-weight:400;color:var(--text2)}
    .es-browse{font-size:10px;font-weight:600;color:var(--teal);cursor:pointer;white-space:nowrap;background:none;border:none;font-family:var(--font);padding:0}
    .es-browse:hover{text-decoration:underline}
    .sugg-hscroll{display:flex;gap:8px;overflow-x:auto;padding:10px 13px 12px;scrollbar-width:none}
    .sugg-hscroll::-webkit-scrollbar{display:none;height:0}
    .sugg-hcard{flex-shrink:0;width:140px;height:155px;border:1px solid var(--border);border-radius:10px;overflow:hidden;cursor:pointer;background:var(--white);transition:border-color .15s;display:flex;flex-direction:column}
    .sugg-hcard:hover{border-color:var(--teal)}
    .sugg-himg{height:64px;display:flex;align-items:center;justify-content:center;font-size:18px;overflow:hidden}
    .sugg-hbody{padding:5px 7px 4px;flex:1;overflow:hidden}
    .sugg-hname{font-size:12px;font-weight:600;color:var(--text);line-height:1.3;margin-bottom:2px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
    .sugg-hkcal{font-size:9px;color:var(--text3)}
    .sugg-hadd{width:100%;padding:5px 0;font-size:10px;font-weight:700;background:var(--teal);color:#fff;border:none;cursor:pointer;font-family:var(--font);transition:background .15s;flex-shrink:0;margin-top:auto}
    .sugg-hadd:hover{background:var(--teal2)}
    .sugg-hadd:disabled{background:var(--teal-l);color:var(--teal);cursor:default}
    .sugg-hmore{display:flex;align-items:center;justify-content:center;border-style:dashed;color:var(--text3);height:140px;flex-direction:column}

    /* ── Nutrition panel ── */
    .sum-bar{display:flex;align-items:center;gap:8px;background:var(--navy);border-radius:var(--r);padding:10px 13px;color:#fff;flex-shrink:0}
    .sum-bar-dot{width:6px;height:6px;border-radius:50%;background:var(--teal);flex-shrink:0;animation:pulse 2s infinite}
    .sum-bar-txt{font-size:12px;color:rgba(255,255,255,.85);line-height:1.4;flex:1}.sum-bar-txt strong{color:#fff;font-weight:700}
    .nut-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:15px;width:100%;box-sizing:border-box}
    .nc-title{font-family:var(--display);font-size:16px;font-weight:700;color:var(--text)}
    .nc-sub{font-size:11px;color:var(--text2);margin-top:1px;margin-bottom:11px}
    .donut-wrap{display:flex;align-items:center;gap:12px;margin-bottom:12px}
    .dsw{position:relative;width:76px;height:76px;flex-shrink:0}
    .dcenter{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
    .dcval{font-family:var(--display);font-size:15px;font-weight:700;color:var(--text);line-height:1}
    .dcunit{font-size:10px;color:var(--text2)}
    .di-pct{font-size:20px;font-weight:800;color:var(--teal);line-height:1}
    .di-lbl{font-size:10px;color:var(--text2);margin-top:1px}
    .di-rem{font-size:10px;color:var(--text2);margin-top:4px}
    .macro-stat-row{display:flex;flex-direction:column;gap:5px;margin-top:2px}
    .msr-cell{display:flex;align-items:center;gap:8px;padding:6px 10px;background:var(--bg);border-radius:var(--r-sm);border:1px solid var(--border)}
    .msr-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
    .msr-name{font-size:11px;font-weight:600;color:var(--text2);width:50px;flex-shrink:0}
    .msr-bar{flex:1;height:8px;background:var(--border);border-radius:4px;overflow:hidden;position:relative}
    .msr-fill{height:8px;border-radius:4px;transition:width .4s ease;position:relative;display:flex;align-items:center;justify-content:flex-end;min-width:28px}
    .msr-fill-lbl{font-size:9px;font-weight:800;color:#fff;padding-right:4px;white-space:nowrap;line-height:1;pointer-events:none;opacity:.9}
    .msr-pct{font-size:11px;font-weight:700;width:32px;text-align:right;flex-shrink:0}
    .msr-val{font-size:11px;font-weight:600;color:var(--text2);text-align:right;white-space:nowrap;flex-shrink:0;min-width:80px}
    .cond-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:13px 15px}
    .cond-hd{font-size:10px;font-weight:700;color:var(--text2);margin-bottom:8px}
    .cpills{display:flex;flex-direction:column;gap:5px}
    .cpill{display:flex;align-items:center;gap:7px;padding:6px 9px;border-radius:var(--r-sm);font-size:11px;font-weight:600}
    .cp-amber{background:var(--coral-l);color:#8B2E10}
    .cp-purple{background:var(--purple-l);color:#26215C}
    .cp-red{background:var(--red-l);color:#791F1F}
    .cp-ic{width:13px;height:13px;border-radius:50%;flex-shrink:0}
    .cp-rule{margin-left:auto;font-size:9px;font-weight:600;color:var(--text2)}

    /* ── MealCard detail section ── */
    .mc-detail{border-top:1px solid var(--border);padding:11px 13px;background:var(--bg);display:flex;flex-direction:column;gap:9px}
    .mcd-hd{font-size:10px;font-weight:700;color:var(--text2);margin-bottom:5px}
    .ings{display:flex;flex-wrap:wrap;gap:5px}
    .ing{font-size:11px;padding:3px 9px;background:var(--white);border:1px solid var(--border);border-radius:20px;color:var(--text2);font-weight:500;display:flex;align-items:center;gap:4px}
    .idot{width:4px;height:4px;border-radius:50%;background:var(--teal);flex-shrink:0}
    .steps{display:flex;flex-direction:column;gap:6px}
    .step{display:flex;gap:8px;align-items:flex-start}
    .step-n{width:18px;height:18px;border-radius:50%;background:var(--teal);color:#fff;font-size:9px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
    .step-t{font-size:12px;color:var(--text2);line-height:1.5;flex:1}
    .mc-detail-toggle{font-size:11px;font-weight:600;color:var(--teal);cursor:pointer;background:none;border:none;font-family:var(--font);padding:4px 0;text-align:left}

    /* ── Shared buttons ── */
    .btn{padding:6px 13px;border-radius:var(--r-sm);font-size:12px;font-weight:600;cursor:pointer;border:none;font-family:var(--font);transition:all .15s;display:inline-flex;align-items:center;gap:5px;line-height:1.3}
    .btn-primary{background:var(--teal);color:#fff}.btn-primary:hover{background:var(--teal2)}
    .btn-navy{background:var(--navy);color:#fff}.btn-navy:hover{background:#0d2d58}
    .btn-outline{background:var(--white);color:var(--text2);border:1px solid var(--border2)}.btn-outline:hover{background:var(--bg)}

    /* ── Profiles screen ── */
    .prof-pav{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:#fff;flex-shrink:0}
    .prof-chip{display:flex;align-items:center;gap:6px;padding:4px 12px 4px 4px;border-radius:20px;border:1.5px solid var(--border2);background:var(--white);cursor:pointer;font-family:var(--font);transition:all .15s;user-select:none}
    .prof-chip:hover{border-color:var(--teal);background:var(--teal-xl)}
    .prof-chip-on{border-color:var(--teal);background:var(--teal-xl);box-shadow:0 0 0 2px rgba(6,155,142,.12)}
    .prof-chip-on .prof-chip-name{color:var(--text);font-weight:700}
    .prof-chip-name{font-size:12px;font-weight:600;color:var(--text2);white-space:nowrap}
    .prof-chip-add{border-style:dashed;padding:4px 10px 4px 8px}
    .prof-chip-add:hover .prof-chip-name{color:var(--teal)}
    .prof-panel{display:flex;flex-direction:column;gap:9px}
    .prof-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
    .prof-card-flat{background:var(--white);border:none;border-radius:var(--r);overflow:hidden}
    .dcav{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#fff;flex-shrink:0}
    .dcav-t{background:linear-gradient(135deg,var(--teal),var(--teal2))}
    .dcav-p{background:linear-gradient(135deg,var(--purple),#9B59B6)}
    .dcav-b{background:linear-gradient(135deg,var(--blue),var(--blue2))}
    .dcs-v{font-family:var(--font);font-size:16px;font-weight:800;color:var(--text)}
    .dcs-l{font-size:10px;color:var(--text2);margin-top:3px}
    .dc-hda{display:grid;grid-template-columns:1fr 1fr 1fr;border-top:1px solid var(--border);background:var(--white)}
    .dc-hda-col{padding:12px 16px 14px}
    .dc-hda-col+.dc-hda-col{border-left:1px solid var(--border)}
    .dc-hda-lbl{font-size:9px;font-weight:700;color:var(--text2);text-transform:none;letter-spacing:0;margin-bottom:8px}
    /* Nutrition dashboard */
    .nd-wrap{border-top:1px solid var(--border);background:var(--white)}
    .nd-range-pill{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:1.5px solid var(--border2);background:var(--white);color:var(--text2);font-family:var(--font);transition:all .15s}
    .nd-range-pill:hover{border-color:var(--teal);color:var(--teal)}
    .nd-range-pill.active{background:var(--navy);border-color:var(--navy);color:#fff}
    .nd-range-nav-btn{width:24px;height:24px;border-radius:6px;border:1px solid var(--border2);background:var(--white);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--text2);font-family:var(--font);transition:all .15s}
    .nd-range-nav-btn:hover{border-color:var(--teal);color:var(--teal)}
    .nd-range-period{font-size:11px;font-weight:600;color:var(--text2);min-width:80px;text-align:center}
    .nd-tabs-row{display:flex;overflow-x:auto;border-bottom:1px solid var(--border);background:var(--white);padding:0 18px;gap:0}
    .nd-tabs-row::-webkit-scrollbar{display:none}
    .nd-tab{display:flex;align-items:center;gap:5px;padding:11px 13px 10px;font-size:11px;font-weight:600;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s;user-select:none;flex-shrink:0;background:none;border-top:none;border-left:none;border-right:none;font-family:var(--font)}
    .nd-tab:hover{color:var(--text)}
    .nd-tab.nd-active{font-weight:700;color:var(--text)}
    .nd-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
    .nd-chart-section{padding:14px 20px 10px}
    .nd-chart-meta{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px}
    .nd-avgval{font-size:20px;font-weight:800;color:var(--text);line-height:1;font-family:var(--display)}
    .nd-avgsub{font-size:10px;color:var(--text2);margin-top:4px}
    .nd-avgtgt{font-size:10px;color:var(--text3)}
    .nd-status{margin-top:5px}
    .nd-spill{font-size:9px;font-weight:700;padding:2px 8px;border-radius:20px;display:inline-block}
    .nd-spill-green{background:var(--green-l);color:var(--green)}
    .nd-spill-amber{background:var(--amber-l);color:#633806}
    .nd-spill-red{background:var(--red-l);color:var(--red)}
    .nd-spill-teal{background:var(--teal-l);color:var(--teal)}
    .nd-meta-right{display:flex;flex-direction:column;align-items:flex-end;gap:7px}
    .nd-vt-wrap{display:flex;border:1px solid var(--border2);border-radius:7px;overflow:hidden}
    .nd-vt{font-size:10px;font-weight:600;padding:3px 10px;border:none;background:none;cursor:pointer;color:var(--text2);transition:all .15s;font-family:var(--font)}
    .nd-vt.nd-vt-active{background:var(--navy);color:#fff}
    .nd-leg-wrap{display:flex;flex-direction:column;gap:4px;align-items:flex-end}
    .nd-leg-item{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--text2)}
    .nd-leg-line{width:16px;height:2px;border-radius:1px;flex-shrink:0}
    .nd-leg-dash{width:16px;height:0;border-top:2px dashed;flex-shrink:0;opacity:.5}
    .nd-sumrow{display:grid;grid-template-columns:repeat(5,1fr);border-top:1px solid var(--border);background:var(--white)}
    .nd-sum-cell{padding:13px 8px;text-align:center;border-right:1px solid var(--border);display:flex;flex-direction:column;align-items:center}
    .nd-sum-cell:last-child{border-right:none}
    .nd-sum-lbl{font-size:10px;font-weight:600;color:var(--text2)}
    .nd-sum-val{font-size:13px;font-weight:700;color:var(--text)}
    .nd-sum-sub{font-size:10px;color:var(--text2);margin-top:1px}
    .nd-sum-lbl-wrap{display:flex;align-items:center;gap:3px;margin-bottom:2px}
    .nd-tip{position:relative;display:inline-flex;align-items:center;cursor:default}
    .nd-tip-ic{width:13px;height:13px;border-radius:50%;background:var(--border2);color:var(--text2);font-size:8px;font-weight:700;display:inline-flex;align-items:center;justify-content:center;line-height:1;font-style:normal;flex-shrink:0}
    .nd-tip-bubble{display:none;position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;font-size:10px;font-weight:500;line-height:1.55;padding:8px 11px;border-radius:7px;white-space:normal;width:240px;overflow-wrap:break-word;word-break:normal;z-index:20;pointer-events:none;box-shadow:0 4px 16px rgba(11,34,64,0.25)}
    .nd-tip-bubble::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:5px solid transparent;border-top-color:var(--navy)}
    .nd-tip-bubble.tip-right{left:auto;right:-6px;transform:none}
    .nd-tip-bubble.tip-right::after{left:auto;right:14px;transform:none}
    .nd-tip:hover .nd-tip-bubble{display:block}
    .nd-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:36px 20px;gap:12px;text-align:center}
    .nd-empty-icon{width:56px;height:56px;border-radius:50%;background:var(--teal-xl);border:1.5px solid rgba(6,155,142,.2);display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .nd-empty-title{font-size:13px;font-weight:700;color:var(--text)}
    .nd-empty-sub{font-size:11px;color:var(--text3);line-height:1.55;max-width:240px}
    .nd-insight{background:var(--teal-xl);border-left:2px solid var(--teal);padding:9px 14px;font-size:10px;color:var(--text2);line-height:1.55}
    .nd-insight strong{color:var(--text);font-weight:700}
    .nd-flag{font-size:9px;font-weight:700;padding:1px 5px;border-radius:20px;flex-shrink:0}
    .nd-bar-legend{display:flex;align-items:center;gap:12px;padding:10px 20px 12px;border-top:1px solid var(--border);flex-wrap:wrap}
    .nd-bl-item{display:flex;align-items:center;gap:4px;font-size:9px;color:var(--text2);white-space:nowrap}
    .nd-sum-cell-accent{background:var(--teal-xl)}
    .nd-bl-swatch{width:10px;height:10px;border-radius:2px;flex-shrink:0}

    /* ── Onboarding wizard ── */
    .overlay-hdr{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
    .overlay-title{font-size:16px;font-weight:800;color:var(--text)}
    .overlay-sub{font-size:12px;color:var(--text3);margin-top:2px}
    .overlay-close{width:28px;height:28px;border-radius:50%;border:1px solid var(--border);background:var(--bg);cursor:pointer;font-size:16px;color:var(--text2);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:var(--font);line-height:1}
    .overlay-body{overflow-y:auto;padding:18px 20px;display:flex;flex-direction:column;gap:16px;flex:1;min-height:0}
    .overlay-body::-webkit-scrollbar{width:4px}
    .overlay-body::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
    .onb-ftr{display:flex;align-items:center;justify-content:space-between;padding-top:14px;border-top:1px solid var(--border);flex-shrink:0}
    .onb-stepbar{display:flex;align-items:stretch;padding:0 20px;flex-shrink:0;border-bottom:1px solid var(--border);background:var(--white)}
    .onb-step{display:flex;align-items:center;gap:6px;flex:1;padding:12px 0;position:relative}
    .onb-step+.onb-step::before{content:'';position:absolute;left:-12px;top:50%;transform:translateY(-50%);width:16px;height:1.5px;background:var(--border)}
    .onb-step.s-done+.onb-step::before,.onb-step.s-active+.onb-step::before{background:var(--teal)}
    .onb-bub{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;flex-shrink:0;transition:all .2s}
    .onb-step.s-done .onb-bub{background:var(--teal);color:#fff}
    .onb-step.s-active .onb-bub{background:var(--navy);color:#fff}
    .onb-step.s-todo .onb-bub{background:var(--bg);color:var(--text3);border:1.5px solid var(--border2)}
    .onb-stxt{font-size:10px;font-weight:600;color:var(--text3);white-space:nowrap}
    .onb-step.s-active .onb-stxt{color:var(--text);font-weight:700}
    .onb-step.s-done .onb-stxt{color:var(--teal)}
    .field{display:flex;flex-direction:column;gap:5px}
    .field-lbl{font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.07em}
    .field-input{border:1.5px solid var(--border2);border-radius:var(--r-sm);padding:10px 13px;font-size:14px;color:var(--text);background:var(--white);font-family:var(--font);outline:none;transition:border .15s;width:100%}
    .field-input:focus{border-color:var(--teal)}
    .field-num{display:flex;align-items:center;border:1.5px solid var(--border2);border-radius:var(--r-sm);overflow:hidden;background:var(--white);transition:border .15s}
    .field-num:focus-within{border-color:var(--teal)}
    .field-num input{flex:1;padding:10px 12px;font-size:17px;font-weight:800;color:var(--text);border:none;outline:none;font-family:var(--font);width:60px;background:transparent}
    .field-num-unit{padding:0 13px;font-size:12px;font-weight:700;color:var(--text3);border-left:1px solid var(--border);white-space:nowrap;align-self:stretch;display:flex;align-items:center}
    .gpills{display:flex;gap:7px}
    .gpill{flex:1;padding:9px 8px;border-radius:var(--r-sm);border:1.5px solid var(--border2);font-size:13px;font-weight:700;text-align:center;color:var(--text2);background:var(--white);cursor:pointer;transition:all .2s;font-family:var(--font)}
    .gpill:hover{border-color:var(--teal);color:var(--teal);background:var(--teal-xl)}
    .gpill.sel{background:var(--teal);border-color:var(--teal);color:#fff}
    .cond-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .cc{border-radius:var(--r);border:1.5px solid var(--border);padding:12px;background:var(--white);cursor:pointer;display:flex;align-items:center;gap:10px;transition:all .2s;user-select:none}
    .cc:hover{border-color:var(--border2)}
    .cc.on-o{border-color:#f59e0b;background:#fffbeb}
    .cc.on-r{border-color:var(--red);background:var(--red-l)}
    .cc.on-p{border-color:var(--purple);background:var(--purple-l)}
    .cc.on-t{border-color:var(--teal);background:var(--teal-xl)}
    .cc-ic{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:18px}
    .cc-name{font-size:13px;font-weight:700;color:var(--text);line-height:1.3}
    .cc.on-o .cc-name{color:#92400e}.cc.on-r .cc-name{color:#991b1b}.cc.on-p .cc-name{color:#4c1d95}
    .cc-sub{font-size:10px;color:var(--text3);margin-top:1px}
    .cc-chk,.role-chk{width:16px;height:16px;border-radius:50%;border:1.5px solid var(--border2);margin-left:auto;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:var(--white);transition:all .2s}
    .cc-chk.chk-on,.role-chk.chk-on{background:var(--teal);border-color:var(--teal)}
    .diet-pills{display:flex;gap:7px;flex-wrap:wrap}
    .dpill{padding:7px 15px;border-radius:20px;border:1.5px solid var(--border2);font-size:12px;font-weight:600;color:var(--text2);background:var(--white);cursor:pointer;transition:all .2s;font-family:var(--font)}
    .dpill:hover{border-color:var(--teal);color:var(--teal);background:var(--teal-xl)}
    .dpill.sel{background:var(--navy);border-color:var(--navy);color:#fff}
    .allerg-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
    .ag{border-radius:var(--r-sm);border:1.5px solid var(--border);padding:11px 7px;background:var(--white);text-align:center;cursor:pointer;transition:all .2s;user-select:none}
    .ag:hover{border-color:var(--border2);background:var(--bg)}
    .ag.sel{border-color:var(--red);background:var(--red-l)}
    .ag-ic{font-size:20px;display:block;margin-bottom:4px}
    .ag-l{font-size:11px;font-weight:700;color:var(--text2)}
    .ag.sel .ag-l{color:var(--red)}
    .role-card{display:flex;align-items:center;gap:11px;border:1.5px solid var(--border);border-radius:var(--r);padding:13px 15px;cursor:pointer;transition:all .2s;background:var(--white);user-select:none}
    .role-card:hover{border-color:var(--border2)}
    .role-card.sel{border-color:var(--teal);background:var(--teal-xl)}
    .role-ic{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .role-ic-navy{background:var(--navy)}
    .role-ic-muted{background:var(--bg);border:1.5px solid var(--border2)}
    .role-title{font-size:13px;font-weight:700;color:var(--text)}
    .role-card.sel .role-title{color:var(--navy)}
    .role-sub{font-size:11px;color:var(--text3);margin-top:2px}

    /* ── MealCard PMW action bar ── */
    .mc-pmw-bar{display:flex;align-items:center;border-top:1px solid var(--border);background:var(--bg);flex-shrink:0}
    .mc-pmw-act{flex:1;display:flex;align-items:center;justify-content:center;gap:5px;height:32px;font-size:11px;font-weight:600;cursor:pointer;border:none;background:none;font-family:var(--font);border-right:1px solid var(--border);color:var(--text2);transition:background .12s;line-height:1}
    .mc-pmw-act:last-child{border-right:none}
    .mc-pmw-act:hover{background:var(--teal-xl);color:var(--teal)}
    .mc-pmw-act.dislike:hover{background:var(--red-l);color:var(--red)}
    .mc-pmw-act.browse:hover{background:var(--blue-l);color:var(--blue)}

    /* ── Repeat-last-week banner ── */
    .repeat-banner{background:var(--teal-xl);border:1px solid rgba(6,155,142,.25);border-radius:var(--r-sm);padding:12px 14px;margin-bottom:14px;display:flex;gap:11px;align-items:flex-start;animation:fadeIn .2s ease;flex-shrink:0}
    @keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
    .rb-ic{width:30px;height:30px;border-radius:50%;background:var(--teal-l);border:1.5px solid rgba(6,155,142,.3);display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .rb-body{flex:1;min-width:0}
    .rb-title{font-size:12px;font-weight:700;color:var(--teal);margin-bottom:2px}
    .rb-sub{font-size:11px;color:var(--text2);line-height:1.45;margin-bottom:8px}
    .rb-actions{display:flex;gap:7px;align-items:center}
    .rb-copy{padding:5px 14px;border-radius:var(--r-xs);background:var(--teal);color:#fff;border:none;font-size:11px;font-weight:700;cursor:pointer;font-family:var(--font);transition:background .15s}
    .rb-copy:hover{background:var(--teal2)}
    .rb-copy:disabled{opacity:.6;cursor:default}
    .rb-skip{font-size:11px;color:var(--text3);cursor:pointer;text-decoration:underline;background:none;border:none;font-family:var(--font)}

    /* ── Empty week split card ── */
    .ewc-wrap{display:grid;grid-template-columns:1fr auto 1fr;border:1px solid var(--border);border-radius:var(--r);background:var(--white);margin-bottom:10px;overflow:hidden}
    .ewc-half{padding:16px;display:flex;flex-direction:column;gap:7px}
    .ewc-divider{width:1px;background:var(--border);flex-shrink:0}
    .ewc-badge{font-size:9px;font-weight:700;padding:3px 9px;border-radius:20px;display:inline-block;text-transform:uppercase;letter-spacing:.06em;align-self:flex-start}
    .ewc-badge-teal{background:var(--teal-xl);color:var(--teal)}
    .ewc-badge-navy{background:#E8EDF3;color:var(--navy)}
    .ewc-title{font-family:var(--display);font-size:14px;font-weight:800;color:var(--text);line-height:1.3}
    .ewc-desc{font-size:11px;color:var(--text3)}
    .ewc-meals{display:flex;flex-direction:column;gap:5px;flex:1}
    .ewc-row{display:flex;align-items:center;gap:7px;padding:5px 8px;background:var(--bg);border-radius:6px}
    .ewc-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
    .ewc-meal{font-size:11px;color:var(--text2);font-weight:500}
    .ewc-more{font-size:10px;color:var(--text3);padding:2px 8px}
    .ewc-empty-note{font-size:11px;color:var(--text3);padding:5px 8px;font-style:italic}
    .ewc-btn{width:100%;padding:8px 0;border-radius:var(--r-sm);font-family:var(--font);font-size:12px;font-weight:700;cursor:pointer;border:none;margin-top:2px;transition:opacity .15s}
    .ewc-btn-teal{background:var(--teal);color:#fff}.ewc-btn-teal:hover{opacity:.88}
    .ewc-btn-navy{background:var(--navy);color:#fff}.ewc-btn-navy:hover{opacity:.88}
    .ewc-btn:disabled{opacity:.4;cursor:default}

    /* ── Shopping screen ── */
    .shop-bar{display:flex;align-items:center;gap:6px;flex-wrap:nowrap;padding:10px 18px 8px;flex-shrink:0;border-bottom:1px solid var(--border);overflow-x:auto}
    .shop-bar::-webkit-scrollbar{display:none}
    .shop-rpill{padding:4px 12px;border-radius:var(--r-xs);font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--border2);background:var(--white);color:var(--text2);transition:all .12s;user-select:none;line-height:1.6;white-space:nowrap;font-family:var(--font)}
    .shop-rpill.on{background:var(--navy);border-color:var(--navy);color:#fff}
    .shop-rpill:hover:not(.on){border-color:var(--teal);color:var(--teal)}
    .shop-sep{width:1px;height:14px;background:var(--border2);flex-shrink:0;margin:0 2px}
    .shop-dchip{display:inline-flex;align-items:center;gap:5px;padding:3px 10px 3px 4px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:1.5px solid var(--border2);background:var(--white);color:var(--text2);transition:all .12s;user-select:none;font-family:var(--font)}
    .shop-dchip.on{border-color:var(--teal);background:var(--teal-xl);color:var(--teal)}
    .shop-dchip-av{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:800;color:#fff;flex-shrink:0}
    .shop-progress-row{display:flex;align-items:center;gap:10px;padding:7px 18px;background:var(--bg);border-bottom:1px solid var(--border);flex-shrink:0}
    .shop-prog-big{font-size:12px;font-weight:700;color:var(--text);white-space:nowrap}
    .shop-prog-bar{flex:1;height:5px;background:var(--border);border-radius:3px;overflow:hidden}
    .shop-prog-fill{height:5px;background:var(--teal);border-radius:3px;transition:width .3s}
    .shop-prog-pct{font-size:11px;font-weight:700;color:var(--teal);white-space:nowrap}
    .shop-layout{display:grid;grid-template-columns:160px 1fr;flex:1;overflow:hidden;min-height:0}
    .shop-sidebar{display:flex;flex-direction:column;border-right:1px solid var(--border);background:var(--white);overflow-y:auto}
    .shop-sidebar::-webkit-scrollbar{width:3px}
    .shop-sidebar::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
    .shop-sidebar-item{display:flex;align-items:flex-start;gap:6px;padding:8px 12px;cursor:pointer;transition:all .12s;user-select:none;border-left:3px solid transparent}
    .shop-sidebar-item:hover{background:var(--bg)}
    .shop-sidebar-item.active{background:var(--teal-xl);border-left-color:var(--teal)}
    .shop-sidebar-item.active .shop-si-lbl{color:var(--text);font-weight:700}
    .shop-si-icon{width:20px;height:20px;border-radius:5px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:12px;line-height:1}
    .shop-si-body{flex:1;min-width:0}
    .shop-si-row{display:flex;align-items:center;justify-content:space-between;gap:4px}
    .shop-si-lbl{font-size:12px;font-weight:500;color:var(--text2);line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .shop-si-count{font-size:10px;color:var(--text3);flex-shrink:0}
    .shop-si-done{font-size:10px;color:var(--teal);font-weight:700;flex-shrink:0}
    .shop-si-bar{width:100%;height:2px;background:var(--border);border-radius:1px;overflow:hidden;margin-top:3px}
    .shop-si-fill{height:2px;background:var(--teal);border-radius:1px;transition:width .3s}
    .shop-panel-body{flex:1;overflow-y:auto;padding:14px 18px}
    .shop-panel-body::-webkit-scrollbar{width:4px}
    .shop-panel-body::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
    .shop-cat-hd{font-size:10px;font-weight:800;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:9px}
    .shop-tokens{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:22px}
    .shop-token{display:inline-flex;align-items:center;gap:6px;padding:5px 11px 5px 8px;border-radius:20px;border:1px solid var(--border);background:var(--white);cursor:pointer;transition:all .15s;user-select:none;font-family:var(--font)}
    .shop-token:hover{border-color:var(--teal)}
    .shop-token.checked{opacity:.45}
    .shop-token.checked .shop-tok-name{text-decoration:line-through;color:var(--text3)}
    .shop-tok-dot{width:8px;height:8px;border-radius:50%;border:1.5px solid var(--border2);flex-shrink:0;transition:all .15s}
    .shop-token.checked .shop-tok-dot{background:var(--teal);border-color:var(--teal)}
    .shop-tok-name{font-size:12px;font-weight:600;color:var(--text);white-space:nowrap}
    .shop-tok-qty{font-size:11px;color:var(--text2);white-space:nowrap}
    .shop-tok-qty::before{content:'·';margin:0 3px;color:var(--border2)}

    /* ── Toast ── */
    .toast{position:absolute;bottom:24px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;padding:10px 16px;border-radius:10px;font-size:13px;font-weight:600;z-index:100;white-space:nowrap;animation:fadeUp .25s ease;box-shadow:0 4px 16px rgba(11,34,64,.25);pointer-events:auto;display:flex;align-items:center;gap:12px}
    @keyframes fadeUp{from{opacity:0;transform:translate(-50%,8px)}to{opacity:1;transform:translate(-50%,0)}}

    /* ── Discover screen ── */
    .disc-hdr{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:15px}
    .disc-h1{font-family:var(--display);font-size:20px;font-weight:800;color:var(--text)}
    .disc-sub{font-size:11px;color:var(--text3);margin-top:3px}
    .disc-match-count{font-size:12px;color:var(--text3);font-weight:600}
    .disc-match-count span{color:var(--teal);font-weight:800}
    .searchbox{display:flex;align-items:center;gap:9px;background:var(--white);border:1.5px solid var(--border);border-radius:var(--r-sm);padding:8px 12px;margin-bottom:13px;transition:border-color .15s}
    .searchbox:focus-within{border-color:var(--teal)}
    .s-inp{border:none;outline:none;font-size:13px;color:var(--text);background:transparent;flex:1;font-family:var(--font)}
    .s-inp::placeholder{color:var(--text3)}
    .disc-filter-section{margin-bottom:14px}
    .disc-filter-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px}
    .disc-filter-label{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.07em}
    .disc-filter-clear{font-size:10px;font-weight:600;color:var(--teal);cursor:pointer;background:none;border:none;font-family:var(--font);padding:0}
    .disc-filter-chips{display:flex;gap:6px;flex-wrap:wrap}
    .disc-fchip{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:1.5px solid var(--border2);background:var(--white);color:var(--text2);transition:all .15s;user-select:none;font-family:var(--font)}
    .disc-fchip:hover{border-color:var(--teal);color:var(--teal);background:var(--teal-xl)}
    .disc-fchip.diet-active{background:var(--teal-l);border-color:var(--teal);color:var(--teal)}
    .disc-fchip.allergen-active{background:var(--red-l);border-color:var(--red);color:var(--red)}
    .disc-fchip-dot{width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0}
    .disc-active-bar{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--blue-xl);border:1px solid var(--blue-l);border-radius:var(--r-sm);margin-bottom:12px;flex-wrap:wrap}
    .disc-active-bar-lbl{font-size:10px;font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:.06em;flex-shrink:0}
    .disc-active-pills{display:flex;gap:5px;flex-wrap:wrap;flex:1}
    .disc-active-pill{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:600;padding:2px 9px;border-radius:20px}
    .disc-ap-diet{background:var(--teal-l);color:var(--teal)}
    .disc-ap-allergen{background:var(--red-l);color:var(--red)}
    .disc-active-bar-reset{font-size:10px;font-weight:600;color:var(--text3);cursor:pointer;background:none;border:none;font-family:var(--font);padding:0;flex-shrink:0;transition:color .15s}
    .disc-active-bar-reset:hover{color:var(--red)}
    /* Recipe grid */
    .recipe-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px}
    .rc{background:var(--white);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;cursor:pointer;transition:all .2s}
    .rc:hover{border-color:var(--teal);transform:translateY(-1px);box-shadow:0 4px 12px rgba(11,34,64,.08)}
    .rc-img{height:120px;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:32px}
    .rc-kcal{position:absolute;bottom:7px;right:8px;background:rgba(255,255,255,.92);padding:3px 9px;border-radius:12px;font-size:12px;font-weight:800;color:var(--teal)}
    .rc-body{padding:10px 12px 12px}
    .rc-name{font-family:var(--display);font-size:14px;font-weight:700;color:var(--text);line-height:1.35;margin-bottom:6px}
    .rc-tags{display:flex;flex-wrap:wrap;gap:4px;align-items:center}
    .rct{font-size:9px;padding:2px 6px;border-radius:10px;font-weight:700;background:var(--teal-l);color:var(--teal)}
    .rc-add-btn{font-size:10px;font-weight:700;padding:3px 10px;border-radius:10px;background:var(--teal);color:#fff;border:none;cursor:pointer;font-family:var(--font);margin-left:auto;flex-shrink:0;transition:background .15s}
    .rc-add-btn:hover{background:var(--teal2)}
    .rc-add-btn:disabled{background:var(--teal-l);color:var(--teal);cursor:default}
    /* Food visual gradients for recipe cards */
    .fv-d1{background:linear-gradient(135deg,#FEF3C7,#FDE68A)}
    .fv-d2{background:linear-gradient(135deg,#D1FAE5,#A7F3D0)}
    .fv-d3{background:linear-gradient(135deg,#DBEAFE,#BFDBFE)}
    .fv-d4{background:linear-gradient(135deg,#FCE7F3,#FBCFE8)}
    .fv-d5{background:linear-gradient(135deg,#EDE9FE,#DDD6FE)}
    .fv-d6{background:linear-gradient(135deg,#FEF3C7,#FCA5A5)}

    /* ── Health Tracker ── */
    .ht-form-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:16px}
    .ht-form-hdr{padding:14px 18px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
    .ht-form-title{font-size:14px;font-weight:800;color:var(--text);display:flex;align-items:center;gap:8px}
    .ht-form-sub{font-size:11px;color:var(--text3);font-weight:600}
    .ht-form-body{padding:16px 18px}
    .ht-form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
    .ht-field{display:flex;flex-direction:column;gap:4px}
    .ht-field-lbl{font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.06em}
    .ht-field-input{border:1.5px solid var(--border2);border-radius:var(--r-xs);padding:8px 11px;font-size:13px;color:var(--text);background:var(--white);font-family:var(--font);outline:none;transition:border .15s;width:100%;box-sizing:border-box}
    .ht-field-input:focus{border-color:var(--teal)}
    .ht-field-input.ht-num{width:90px;text-align:right;font-weight:700;font-size:14px}
    .ht-metric-group{margin-bottom:14px;padding:10px 14px;background:var(--bg);border-radius:var(--r-sm);border:1px solid var(--border)}
    .ht-metric-label{font-size:12px;font-weight:700;color:var(--navy);display:flex;align-items:center;gap:7px;margin-bottom:8px}
    .ht-metric-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
    .ht-field-inline{display:flex;align-items:center;gap:8px}
    .ht-field-unit{font-size:11px;font-weight:600;color:var(--text3);white-space:nowrap}
    .ht-bp-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
    .ht-bp-slash{font-size:18px;font-weight:300;color:var(--text3)}
    .ht-bp-mmhg{font-size:11px;font-weight:700;color:var(--text3);margin-left:2px}
    .ht-chol-toggle{background:none;border:none;font-size:11px;font-weight:600;color:var(--teal);cursor:pointer;font-family:var(--font);padding:6px 0 2px;transition:color .15s}
    .ht-chol-toggle:hover{color:var(--teal2)}
    .ht-chol-details{display:flex;flex-direction:column;gap:8px;margin-top:8px;padding-top:8px;border-top:1px solid var(--border)}
    /* save btn removed — auto-save on blur/enter */

    .ht-controls-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:12px;flex-wrap:wrap}
    .ht-range-pills{display:flex;gap:6px}
    .ht-meals-toggle{display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none}
    .ht-toggle-label{font-size:11px;font-weight:700;color:var(--text2)}
    .ht-toggle-switch{width:36px;height:20px;border-radius:10px;background:var(--border2);position:relative;cursor:pointer;transition:background .2s}
    .ht-toggle-switch.on{background:var(--teal)}
    .ht-toggle-knob{width:16px;height:16px;border-radius:50%;background:#fff;position:absolute;top:2px;left:2px;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.15)}
    .ht-toggle-switch.on .ht-toggle-knob{left:18px}

    .ht-chart-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:14px}
    .ht-chart-hdr{padding:14px 18px 8px;display:flex;align-items:flex-start;justify-content:space-between}
    .ht-chart-title{font-size:14px;font-weight:800;color:var(--text)}
    .ht-chart-unit{font-size:10px;color:var(--text3);margin-top:2px}
    .ht-range-label{font-size:10px;font-weight:600;color:var(--teal);display:flex;align-items:center;gap:5px;background:var(--teal-xl);padding:3px 10px;border-radius:20px;border:1px solid rgba(6,155,142,.15)}
    .ht-range-dot{width:6px;height:6px;border-radius:50%;background:rgba(6,155,142,.3);flex-shrink:0}
    .ht-chart-empty{padding:36px 20px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:4px}

    .ht-meals-section{background:var(--white);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:14px}
    .ht-meals-hdr{padding:12px 18px 10px;border-bottom:1px solid var(--border);font-size:13px;font-weight:800;color:var(--text);display:flex;align-items:center;gap:8px}
    .ht-meals-list{padding:4px 0}
    .ht-meal-day{padding:10px 18px;border-bottom:1px solid var(--border)}
    .ht-meal-day:last-child{border-bottom:none}
    .ht-meal-day-hdr{display:flex;align-items:center;gap:8px;margin-bottom:8px}
    .ht-meal-day-date{font-size:12px;font-weight:700;color:var(--navy)}
    .ht-meal-day-tag{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px}
    .ht-meal-day-slots{display:flex;flex-direction:column;gap:6px}
    .ht-meal-slot{padding:6px 0}
    .ht-meal-slot-label{font-size:10px;font-weight:700;color:var(--text2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em}
    .ht-meal-dishes{display:flex;gap:8px;flex-wrap:wrap}
    .ht-meal-dish{display:flex;align-items:center;gap:7px;padding:4px 10px 4px 4px;background:var(--bg);border:1px solid var(--border);border-radius:8px}
    .ht-meal-thumb{width:32px;height:32px;border-radius:6px;overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:var(--teal-xl)}
    .ht-meal-dish-name{font-size:11px;font-weight:600;color:var(--text);line-height:1.3;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

    .ht-entries-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:14px}
    .ht-entries-hdr{padding:12px 18px 10px;border-bottom:1px solid var(--border);font-size:13px;font-weight:800;color:var(--text)}
    .ht-entries-list{padding:0}
    .ht-entry{display:flex;align-items:center;gap:10px;padding:9px 18px;border-bottom:1px solid var(--border);transition:background .12s}
    .ht-entry:last-child{border-bottom:none}
    .ht-entry:hover{background:var(--bg)}
    .ht-entry-date{font-size:12px;font-weight:700;color:var(--navy);min-width:60px;flex-shrink:0;display:flex;flex-direction:column;gap:1px}
    .ht-entry-time{font-size:10px;font-weight:500;color:var(--text3)}
    .ht-entry-vals{display:flex;gap:5px;flex:1;flex-wrap:wrap}
    .ht-entry-pill{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;white-space:nowrap}
    .ht-entry-del{background:none;border:1px solid var(--border);border-radius:6px;width:24px;height:24px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text3);transition:all .15s;flex-shrink:0}
    .ht-entry-del:hover{border-color:var(--red);color:var(--red);background:var(--red-l)}
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/index.jsx"></script>
</body>
</html>
